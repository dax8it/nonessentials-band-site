site:
  title: The Non-Essentials
  description: NJ/NY cover band performing rock and alternative rock hits from the 70s, 80s, 90s, and 2000s.
  url: https://nonessentials.band
  og_image: assets/images/card.jpg
  accent: "#DCFF08"
  background: "#302D2A"
  text: "#FFFFFF"

hero:
  eyebrow: Northern New Jersey cover band
  title: Classic Rock-n-Roll
  intro: >-
    Rocking the NJ area with a blend of iconic tunes from the 70s, 80s, 90s,
    and 00s, The Non-Essentials have been igniting stages since 2020. Seasoned
    musicians, zero gimmicks, just a loud, tight, high-energy set built for bars,
    parties, clubs, and private events.
  cta_primary:
    label: See upcoming shows
    href: "#shows"
  cta_secondary:
    label: Book the band
    href: "#contact"
  background_image: assets/images/container09.jpg

