contact:
  heading: Contact Us
  intro: We're loaded and ready to perform a great show for you. Reach out and let us know the details.
  email: Pvcampanelli@aol.com
  booking_note: Available for bars, private parties, festivals, and corporate events across the tristate area.
  background_image: assets/images/container06.jpg

mailing_list:
  heading: Mailing List
  intro: Sign up for our mailing list so we can let you know what shows we're playing, plus occasional giveaways and announcements.

